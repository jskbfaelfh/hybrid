<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} | تسجيل الدخول</title>
    <!-- Google Fonts Outfit & Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 30px;
            text-align: center;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .login-logo {
            font-size: 3rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 12px var(--neon-blue-glow));
        }
        
        .login-card h2 {
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #999);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .login-card p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        
        .error-message {
            color: #f87171;
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
 
    <div class="glass-card login-card">
        <div class="login-logo">
            {% if company_logo %}
                <img src="/static/uploads/{{ company_logo }}" style="max-height: 70px; object-fit: contain; margin-bottom: 10px; border-radius: 8px;">
            {% else %}
                ☀️
            {% endif %}
        </div>
        <h2>{{ company_name }}</h2>
        <p>نظام إدارة المبيعات الميدانية، الأقساط والمخزن</p>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group" style="text-align: right; margin-bottom: 20px;">
                <label class="form-label">كلمة مرور لوحة التحكم *</label>
                <input type="password" id="adminPassword" class="form-control" placeholder="أدخل كلمة مرور النظام" required style="width: 100%; text-align: center; letter-spacing: 2px;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 12px;">🔓 تسجيل الدخول للنظام</button>
            <div id="errorBox" class="error-message"></div>
        </form>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('adminPassword').value;
            const errorBox = document.getElementById('errorBox');
            errorBox.innerText = '';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.reload();
                } else {
                    errorBox.innerText = data.message || 'فشل تسجيل الدخول';
                }
            } catch (err) {
                errorBox.innerText = 'فشل الاتصال بالخادم الداخلي';
            }
        }
    </script>
</body>
</html>

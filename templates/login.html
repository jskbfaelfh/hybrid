<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company_name }} | تسجيل الدخول</title>
    <!-- Google Fonts Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(17, 24, 39, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #00f2fe;
            --neon-orange: #ff8c00;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 10% 20%, rgba(0, 242, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 140, 0, 0.12) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Glassmorphic Login Card */
        .login-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            transform: translateY(0);
            transition: all 0.4s ease;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, var(--neon-blue), transparent, var(--neon-orange));
            z-index: -1;
            opacity: 0.3;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
            filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .brand-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #bbb);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--neon-blue), #0077ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5);
            background: linear-gradient(135deg, #00f2fe, var(--neon-orange));
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            display: none;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .footer-text {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                {% if company_logo %}
                    <img src="/static/uploads/{{ company_logo }}" style="max-height: 70px; object-fit: contain; margin-bottom: 10px; border-radius: 8px;">
                {% else %}
                    ☀️
                {% endif %}
            </div>
            <h1 class="brand-title">{{ company_name }}</h1>
            <p class="brand-subtitle">نظام إدارة وتنصيب أنظمة الطاقة الشمسية والمالية</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
            <div class="input-group">
                <label for="password" class="input-label">كلمة مرور لوحة التحكم</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">دخول آمن</button>
        </form>

        <div class="footer-text">
            &copy; 2026 {{ company_name }}. جميع الحقوق محفوظة لمدير النظام.
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    window.location.reload();
                } else {
                    errorDiv.innerText = data.error || 'كلمة المرور غير صحيحة';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'حدث خطأ في الاتصال بالخادم';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
